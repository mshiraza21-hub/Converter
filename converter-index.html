<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Unit Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Cabinet+Grotesk:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --card: #ffffff;
      --border: #e0d9cc;
      --text: #1a1a2e;
      --muted: #9b9080;
      --accent-temp: #ff6b6b;
      --accent-dist: #4ecdc4;
      --accent-weight: #45b7d1;
      --active: #1a1a2e;
      --active-text: #f5f0e8;
      --shadow: 0 8px 40px rgba(0,0,0,0.08);
      --radius: 20px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cabinet Grotesk', sans-serif;
      padding: 20px;
    }

    /* Decorative background shapes */
    body::before {
      content: '';
      position: fixed;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,107,0.08) 0%, transparent 70%);
      top: -50px; right: -50px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 250px; height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(78,205,196,0.08) 0%, transparent 70%);
      bottom: -30px; left: -30px;
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 {
      font-family: 'Clash Display', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      line-height: 1;
    }

    .header p {
      font-size: 14px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 300;
    }

    /* Category tabs */
    .tabs {
      display: flex;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .tab {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 14px;
      background: transparent;
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .tab .icon { font-size: 18px; }

    .tab.active {
      background: var(--active);
      color: var(--active-text);
    }

    .tab.active.temp  { background: var(--accent-temp); }
    .tab.active.dist  { background: var(--accent-dist); }
    .tab.active.weight { background: var(--accent-weight); }

    /* Main card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
    }

    /* Direction toggle */
    .direction-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .unit-label {
      font-family: 'Clash Display', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 16px;
      min-width: 100px;
      text-align: center;
    }

    .swap-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      color: var(--text);
    }

    .swap-btn:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
      transform: rotate(180deg);
    }

    /* Input */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-family: 'Clash Display', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    .input-group input::-webkit-outer-spin-button,
    .input-group input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .input-group input:focus { border-color: var(--text); }

    /* Convert button */
    .convert-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: var(--text);
      color: var(--bg);
      font-family: 'Clash Display', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      margin-bottom: 20px;
    }

    .convert-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .convert-btn:active { transform: translateY(0); }

    /* Result */
    .result-box {
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .result-box .result-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .result-box .result-value {
      font-family: 'Clash Display', sans-serif;
      font-size: 38px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      transition: all 0.3s ease;
    }

    .result-box .result-unit {
      font-size: 14px;
      color: var(--muted);
      margin-top: 2px;
    }

    .result-box.has-result {
      border-color: var(--text);
    }

    .result-box.error .result-value {
      font-size: 16px;
      color: var(--accent-temp);
    }

    .pop { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0.5; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .footer span { color: var(--text); font-weight: 600; }

    /* Mobile */
    @media (max-width: 400px) {
      .card { padding: 20px; }
      .header h1 { font-size: 26px; }
      .result-box .result-value { font-size: 30px; }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <h1>Unit Converter</h1>
    <p>Fast & accurate conversions</p>
  </div>

  <!-- Category tabs -->
  <div class="tabs">
    <button class="tab temp active" onclick="setType('temperature', this)">
      <span class="icon">🌡️</span>
      Temp
    </button>
    <button class="tab dist" onclick="setType('distance', this)">
      <span class="icon">📏</span>
      Distance
    </button>
    <button class="tab weight" onclick="setType('weight', this)">
      <span class="icon">⚖️</span>
      Weight
    </button>
  </div>

  <div class="card">

    <!-- Direction toggle -->
    <div class="direction-row">
      <div class="unit-label" id="fromLabel">°C</div>
      <button class="swap-btn" onclick="swapDirection()" title="Swap">⇄</button>
      <div class="unit-label" id="toLabel">°F</div>
    </div>

    <!-- Input -->
    <div class="input-group">
      <label id="inputLabel">Enter value in °C</label>
      <input type="number" id="valueInput" placeholder="0" oninput="autoConvert()"/>
    </div>

    <!-- Convert button -->
    <button class="convert-btn" onclick="convert()">Convert →</button>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      <div class="result-label">Result</div>
      <div class="result-value" id="resultValue">—</div>
      <div class="result-unit" id="resultUnit"></div>
    </div>

  </div>

  <div class="footer">
    Created by <span>Azbara</span> · Powered by <span>Spring Boot</span>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────────
  const units = {
    temperature: { forward: ['°C', '°F'], backward: ['°F', '°C'] },
    distance:    { forward: ['KM', 'Miles'], backward: ['Miles', 'KM'] },
    weight:      { forward: ['KG', 'Pounds'], backward: ['Pounds', 'KG'] },
  };

  let currentType = 'temperature';
  let direction   = 'forward';

  // ── UI helpers ─────────────────────────────────────────
  function updateLabels() {
    const u = units[currentType][direction];
    document.getElementById('fromLabel').textContent  = u[0];
    document.getElementById('toLabel').textContent    = u[1];
    document.getElementById('inputLabel').textContent = `Enter value in ${u[0]}`;
    document.getElementById('resultUnit').textContent  = u[1];
    clearResult();
  }

  function clearResult() {
    const box = document.getElementById('resultBox');
    box.classList.remove('has-result', 'error');
    document.getElementById('resultValue').textContent = '—';
    document.getElementById('resultUnit').textContent  = units[currentType][direction][1];
  }

  function setType(type, btn) {
    currentType = type;
    direction   = 'forward';
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('valueInput').value = '';
    updateLabels();
  }

  function swapDirection() {
    direction = direction === 'forward' ? 'backward' : 'forward';
    document.getElementById('valueInput').value = '';
    updateLabels();
  }

  function autoConvert() {
    const val = document.getElementById('valueInput').value;
    if (val !== '') convert();
    else clearResult();
  }

  // ── Core: call Java backend ────────────────────────────
  async function convert() {
    const input = document.getElementById('valueInput');
    const value = parseFloat(input.value);

    if (isNaN(value)) {
      showError('Please enter a number');
      return;
    }

    try {
      const body = new URLSearchParams({ value, type: currentType, direction });
      const res  = await fetch('/convert', { method: 'POST', body });
      const data = await res.json();

      if (data.error) {
        showError(data.error);
      } else {
        showResult(data.result);
      }
    } catch {
      // Fallback: calculate in browser
      showResult(calculateLocally(value));
    }
  }

  function calculateLocally(value) {
    switch (currentType) {
      case 'temperature':
        return direction === 'forward'
          ? Math.round(((value * 9/5) + 32) * 10000) / 10000
          : Math.round(((value - 32) * 5/9) * 10000) / 10000;
      case 'distance':
        return direction === 'forward'
          ? Math.round(value * 0.621371 * 10000) / 10000
          : Math.round(value / 0.621371 * 10000) / 10000;
      case 'weight':
        return direction === 'forward'
          ? Math.round(value * 2.20462 * 10000) / 10000
          : Math.round(value / 2.20462 * 10000) / 10000;
    }
  }

  function showResult(result) {
    const box   = document.getElementById('resultBox');
    const val   = document.getElementById('resultValue');
    const unit  = document.getElementById('resultUnit');
    box.classList.remove('error');
    box.classList.add('has-result');
    val.textContent  = result;
    unit.textContent = units[currentType][direction][1];
    val.classList.remove('pop');
    void val.offsetWidth;
    val.classList.add('pop');
  }

  function showError(msg) {
    const box = document.getElementById('resultBox');
    box.classList.add('error');
    box.classList.remove('has-result');
    document.getElementById('resultValue').textContent = msg;
    document.getElementById('resultUnit').textContent  = '';
  }

  // ── Keyboard ───────────────────────────────────────────
  document.getElementById('valueInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') convert();
  });

  // Init
  updateLabels();
</script>
</body>
</html>
